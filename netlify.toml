[build]
  command = "pnpm run build"
  publish = "dist"

# The secrets scanning omit list cannot appear directly in repo files because
# Netlify flags the value itself as a secret.  Instead, configure the
# following environment variable in the Netlify web UI (Site settings →
# Build & deploy → Environment → Add variable):
#
#   SECRETS_SCAN_OMIT_KEYS = "SECRET SECRET_INTERNALS API_BASE_URL VITE_API_BASE_URL"
#
# This tells the scanner to ignore the common React internal strings that
# otherwise trigger false positives during the build.