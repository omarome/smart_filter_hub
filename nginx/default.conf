server {
    listen       80;
    server_name  _;

    # ── Static files (Vite build output) ─────────────────────
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse proxy to Spring Boot backend ─────────────────
    # Requests to /api/* are forwarded to the backend container.
    # In Docker Compose the service is named "backend" (adjust if needed).
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ── Caching for static assets ────────────────────────────
    # Vite hashes filenames, so we can cache aggressively.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # ── Gzip compression ─────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
